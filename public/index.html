<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sky0Cloud Browser Hub</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, Arial, sans-serif;
      background: radial-gradient(circle at top, #1f2937, #020617);
      color: white;
    }

    header {
      text-align: center;
      padding: 32px 16px;
    }

    h1 {
      margin: 0;
      font-size: 2.2rem;
    }

    p {
      color: #94a3b8;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .card {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,.35);
    }

    .shared {
      border-color: #22c55e;
    }

    .title {
      font-size: 1.35rem;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .status {
      margin: 12px 0;
      font-weight: 700;
    }

    .free { color: #22c55e; }
    .busy { color: #f59e0b; }
    .shared-text { color: #38bdf8; }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #020617;
      color: white;
      margin: 8px 0;
      font-size: 1rem;
    }

    button, a.button {
      display: block;
      width: 100%;
      box-sizing: border-box;
      margin-top: 10px;
      padding: 12px;
      border-radius: 12px;
      border: none;
      text-align: center;
      text-decoration: none;
      font-weight: 800;
      font-size: 1rem;
      color: white;
      background: #2563eb;
      cursor: pointer;
    }

    button.release {
      background: #dc2626;
    }

    a.spotify {
      background: #16a34a;
    }

    footer {
      text-align: center;
      color: #64748b;
      padding: 24px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Sky0Cloud Browser Hub</h1>
    <p>Claim a browser before using it. Spotify is shared.</p>
  </header>

  <main class="grid" id="grid"></main>

  <footer>
    bru.sky0cloud.dpdns.org
  </footer>

  <script>
    const browsers = [
      { id: "brave1", name: "Brave 1", url: "https://bru1.sky0cloud.dpdns.org" },
      { id: "brave2", name: "Brave 2", url: "https://bru2.sky0cloud.dpdns.org" },
      { id: "brave3", name: "Brave 3", url: "https://bru3.sky0cloud.dpdns.org" },
      { id: "brave4", name: "Brave 4", url: "https://bru4.sky0cloud.dpdns.org" }
    ];

    async function getStatus() {
      const res = await fetch("/api/status");
      return await res.json();
    }

    async function claim(id) {
      const name = document.getElementById(`${id}-name`).value || "Someone";
      await fetch(`/api/claim/${id}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name })
      });
      render();
    }

    async function release(id) {
      await fetch(`/api/release/${id}`, { method: "POST" });
      render();
    }

    function sinceText(iso) {
      if (!iso) return "";
      const mins = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
      if (mins < 1) return "just now";
      if (mins === 1) return "1 minute ago";
      return `${mins} minutes ago`;
    }

    async function render() {
      const status = await getStatus();
      const grid = document.getElementById("grid");

      grid.innerHTML = browsers.map(b => {
        const used = status[b.id];

        return `
          <section class="card">
            <div class="title">${b.name}</div>
            <div class="status ${used ? "busy" : "free"}">
              ${used ? `IN USE by ${used.name} • ${sinceText(used.since)}` : "AVAILABLE"}
            </div>

            <input id="${b.id}-name" placeholder="Your name" />

            <button onclick="claim('${b.id}')">
              Claim
            </button>

            <a class="button" href="${b.url}">
              Open Browser
            </a>

            <button class="release" onclick="release('${b.id}')">
              Release
            </button>
          </section>
        `;
      }).join("");

      grid.innerHTML += `
        <section class="card shared">
          <div class="title">Spotify Shared</div>
          <div class="status shared-text">SHARED SERVICE</div>
          <p>Anyone can use this. It is not claimed.</p>
          <a class="button spotify" href="https://bru5.sky0cloud.dpdns.org">
            Open Spotify
          </a>
        </section>
      `;
    }

    render();
    setInterval(render, 10000);
  </script>
</body>
</html>

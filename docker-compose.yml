services:
  brave1:
    image: lscr.io/linuxserver/brave:latest
    container_name: brave1
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - CUSTOM_USER=user1
      - PASSWORD=admin
    volumes:
      - ./brave/user1:/config
    ports:
      - "127.0.0.1:1001:3000"
    shm_size: "1gb"
    mem_limit: 1400m
    restart: unless-stopped

  brave2:
    image: lscr.io/linuxserver/brave:latest
    container_name: brave2
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - CUSTOM_USER=user1
      - PASSWORD=admin
    volumes:
      - ./brave/user2:/config
    ports:
      - "127.0.0.1:1002:3000"
    shm_size: "1gb"
    mem_limit: 1400m
    restart: unless-stopped

  brave3:
    image: lscr.io/linuxserver/brave:latest
    container_name: brave3
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - CUSTOM_USER=user1
      - PASSWORD=admin
    volumes:
      - ./brave/user3:/config
    ports:
      - "127.0.0.1:1003:3000"
    shm_size: "1gb"
    mem_limit: 1400m
    restart: unless-stopped

  brave4:
    image: lscr.io/linuxserver/brave:latest
    container_name: brave4
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - CUSTOM_USER=user1
      - PASSWORD=admin
    volumes:
      - ./brave/user4:/config
    ports:
      - "127.0.0.1:1004:3000"
    shm_size: "1gb"
    mem_limit: 1400m
    restart: unless-stopped

  spotify:
    image: lscr.io/linuxserver/brave:latest
    container_name: spotify-browser
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - CUSTOM_USER=user1
      - PASSWORD=admin
    volumes:
      - ./spotify:/config
    ports:
      - "127.0.0.1:1010:3000"
    shm_size: "1gb"
    mem_limit: 1200m
    restart: unless-stopped

  dashboard:
    image: node:20-alpine
    container_name: bru-dashboard
    working_dir: /app
    command: sh -c "npm init -y >/dev/null 2>&1 && npm install express >/dev/null 2>&1 && node server.js"
    volumes:
      - ./server.js:/app/server.js:ro
      - ./public:/app/public:ro
      - ./data:/app/data
    ports:
      - "127.0.0.1:1000:3000"
    restart: unless-stopped